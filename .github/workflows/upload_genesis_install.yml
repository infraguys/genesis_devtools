name: Upload and update on self-hosted

on: workflow_dispatch

env:
  PROJECT_NAME: genesis-devtools
  REPO_ENDPOINT_PUT: http://10.20.0.1:8082

jobs:
  upload-install-sh:
    name: Upload install.sh
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Push artifacts to repository
      run: curl -X PUT --upload-file ./etc/install.sh $REPO_ENDPOINT_PUT/install.sh

  update-genesis-cli:
    name: update genesis cli
    needs: upload-install-sh
    runs-on: self-hosted
    steps:
    - name: update genesis cli
      run: |
        set -eux

        mkdir -p "$HOME/bin"
        curl --fail --show-error --location --progress-bar https://repository.genesis-core.tech/genesis-devtools/latest/genesis-linux --output "$HOME/bin/genesis"
        chmod +x "$HOME/bin/genesis"
        
        source ~/.profile
        which genesis
        genesis version
 
