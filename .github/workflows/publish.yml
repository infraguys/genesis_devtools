# .github/workflows/publish.yml
name: Publish Python 🐍 distribution 📦 and binaries

on:
  push:
    tags:
      - '*'

jobs:
  build_python:
    name: Build Python distribution 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v6
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    needs:
    - build_python
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/genesis-devtools
    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  build_binaries:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 30
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install libev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install --yes libev-dev
      - name: Install libev (macOS)
        if: runner.os == 'macOS'
        run: brew install libev
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install tox-uv
        run: uv tool install tox --with tox-uv
      - name: Build executable
        run: tox -e bin
      - name: Rename executable
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/genesis dist/genesis-linux
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/genesis dist/genesis-macos
          fi
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: genesis-${{ matrix.os }}
          path: dist/*

  github-release:
    name: Create GitHub Release with artifacts
    needs:
    - publish-to-pypi
    - build_binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Download Python distributions
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Download Linux binary
      uses: actions/download-artifact@v4
      with:
        name: genesis-ubuntu-latest
        path: dist/
    - name: Download macOS binary
      uses: actions/download-artifact@v4
      with:
        name: genesis-macos-latest
        path: dist/
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create
        "$GITHUB_REF_NAME"
        --repo "$GITHUB_REPOSITORY"
        --notes ""
    - name: Upload release artifacts
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release upload
        "$GITHUB_REF_NAME" dist/**
        --repo "$GITHUB_REPOSITORY"
