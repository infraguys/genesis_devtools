name: build binary

on:
  workflow_dispatch:

jobs:
  build_binaries:
    strategy:
      matrix:
        os: [
          ubuntu-latest,
          macos-latest
        ]
        python-version: ["3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 30
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install libev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install --yes ca-certificates
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install tox-uv
        run: uv tool install tox --with tox-uv
      - name: Build executable
        run: tox -e bin
      - name: Rename executable
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/genesis dist/genesis-linux
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/genesis dist/genesis-macos
          fi
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: genesis-${{ matrix.os }}
          path: dist/*